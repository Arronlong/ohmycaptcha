name: Build and Push Docker Image
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 关键步骤：用Shell命令将用户名转为小写，写入环境变量（兼容所有版本）
      - name: Set lowercase owner env
        run: |
          # 用tr命令把用户名转成全小写
          LOWERCASE_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          # 写入GitHub Actions环境变量，后续步骤可引用
          echo "LOWERCASE_OWNER=$LOWERCASE_OWNER" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.render
          push: true
          # 使用Shell生成的小写用户名变量
          tags: |
            ghcr.io/${{ env.LOWERCASE_OWNER }}/ohmycaptcha:latest
