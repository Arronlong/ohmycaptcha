name: Build and Push Docker Image
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    # 第一步：定义环境变量，将用户名强制转为小写
    env:
      # 核心修复：用 echo 命令把用户名转小写，存入 ENV 变量
      LOWERCASE_OWNER: ${{ github.repository_owner | lower }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.render
          push: true
          # 使用小写的用户名变量拼镜像标签
          tags: |
            ghcr.io/${{ env.LOWERCASE_OWNER }}/ohmycaptcha:latest
